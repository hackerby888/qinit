# Packages the standalone Qubic QPI extension and attaches the Marketplace-ready VSIX to a release.
name: qinit-vscode-release

on:
  push:
    tags: ["qinit-vscode-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: true
        default: "qinit-vscode-v0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Resolve pinned core
        id: core
        run: echo "commit=$(jq -r .core.commit packages/compile/core-snapshot.json)" >> "$GITHUB_OUTPUT"

      - name: Checkout pinned core-lite
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ steps.core.outputs.commit }}
          path: core

      - name: Resolve tag
        id: t
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: bun install

      - name: Cache wasi-sdk
        id: wasisdk
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: wasi-sdk-29.0-x86_64-linux

      - name: Fetch wasi-sdk-29
        if: steps.wasisdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz
          mkdir -p wasi-sdk
          tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1

      - name: Prepare bundled headers
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run --filter qpi-vscode prepare:headers

      - name: Stamp version
        run: |
          V="${{ steps.t.outputs.tag }}"; V="${V#qinit-vscode-}"; V="${V#v}"
          sed -i -E "0,/(\"version\": \")[^\"]*(\")/s//\1$V\2/" packages/vscode/package.json
          grep '"version"' packages/vscode/package.json | head -1

      - name: Package VSIX
        working-directory: packages/vscode
        run: bun run package

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.t.outputs.tag }}"
          NOTES=$'Standalone Qubic QPI VS Code extension.\nInstall this VSIX or search for publisher `qinit` in the Marketplace.'
          gh release create "$TAG" packages/vscode/qpi-vscode.vsix --title "$TAG" --notes "$NOTES" \
          || gh release upload "$TAG" packages/vscode/qpi-vscode.vsix --clobber
