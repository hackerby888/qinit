# Builds + packages the Qubic QPI VS Code extension (.vsix) and attaches it to a GitHub release.
# Install: `qinit ext install` (or download the .vsix and `code --install-extension qpi-vscode.vsix`).
# Versioned independently of the CLI (tag `qinit-vscode-v*`, not `qinit-cli-v*`).
name: qinit-vscode-release

on:
  push:
    tags: ["qinit-vscode-v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag"
        required: true
        default: "qinit-vscode-dev"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Resolve tag
        id: t
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install deps
        run: bun install

      # Stamp the extension version (tag minus 'qinit-vscode-v') into its package.json.
      - name: Stamp version
        run: |
          V="${{ steps.t.outputs.tag }}"; V="${V#qinit-vscode-}"; V="${V#v}"
          sed -i -E "0,/(\"version\": \")[^\"]*(\")/s//\1$V\2/" packages/vscode/package.json
          grep '"version"' packages/vscode/package.json | head -1

      - name: Package VSIX
        working-directory: packages/vscode
        run: bun run package

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.t.outputs.tag }}"
          NOTES=$'Qubic QPI VS Code extension.\nInstall: qinit ext install --vsix qpi-vscode.vsix\n(or `code --install-extension qpi-vscode.vsix`)'
          gh release create "$TAG" packages/vscode/qpi-vscode.vsix --title "$TAG" --notes "$NOTES" \
          || gh release upload "$TAG" packages/vscode/qpi-vscode.vsix --clobber
