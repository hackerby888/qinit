# Auto-track the upstream Qubic contract-verify tool and re-publish it as a moving release
# (verify-latest) that `qinit` clients auto-pull. Republishes when upstream changes OR when a new
# platform is added, so a new upstream build => a new asset => clients update on their next check.
#
# linux-x64 is extracted from the upstream docker image (amd64-only). darwin-arm64 (Apple Silicon —
# the dominant web3-dev platform) is BUILT FROM SOURCE on a macos-14 runner (cmake + flex + CppParser),
# since the docker image can't supply it. A darwin build failure degrades gracefully: the manifest
# just omits that platform and those clients report `unsupported` (build still works, rule check skipped).
name: contractverify tool

on:
  schedule:
    - cron: "0 6 * * 1"            # weekly (Mon 06:00 UTC) — pick up upstream changes
  workflow_dispatch:               # manual refresh
    inputs:
      force:
        description: "Force rebuild + republish even if the upstream version is unchanged"
        type: boolean
        default: false
  push:
    paths: [".github/workflows/verify-tool.yml"]   # publish on first install / edits

permissions:
  contents: write

env:
  TAG: verify-latest
  IMAGE: ghcr.io/franziska-mueller/qubic-contract-verify:latest
  UPSTREAM: https://github.com/Franziska-Mueller/qubic-contract-verify

jobs:
  # linux-x64 built from source (portable); the docker image still resolves the version + change gate.
  # ubuntu-22.04 (glibc 2.35) + static libstdc++ -> binary loads on glibc >= 2.35. The docker-extracted
  # binary needed GCC13/glibc 2.38 and failed to load on common runners (ubuntu-22.04). See memory.
  linux-x64:
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.ver.outputs.version }}
      changed: ${{ steps.gate.outputs.changed }}
    steps:
      - name: Pull upstream image
        run: docker pull "$IMAGE"
      - name: Resolve upstream version (image id)
        id: ver
        run: echo "version=$(docker inspect --format '{{.Id}}' "$IMAGE")" >> "$GITHUB_OUTPUT"
      - name: Change gate
        id: gate
        run: |
          url="https://github.com/${{ github.repository }}/releases/download/${TAG}/verify-manifest.json"
          cur="$(curl -fsSL "$url" 2>/dev/null || echo '{}')"
          curVer="$(echo "$cur" | jq -r '.version' 2>/dev/null || echo none)"
          hasDarwin="$(echo "$cur" | jq -r '.assets["darwin-arm64"] // empty' 2>/dev/null)"
          # republish if upstream changed OR a platform we now build is missing from the live manifest
          if [ "$curVer" = "${{ steps.ver.outputs.version }}" ] && [ -n "$hasDarwin" ] && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"; echo "up to date ($curVer, all platforms present)"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"; echo "republish: ver $curVer->${{ steps.ver.outputs.version }} darwin=$hasDarwin"
          fi
      - name: Build linux-x64 from source (portable — glibc 2.35 base + static libstdc++)
        if: steps.gate.outputs.changed == 'true'
        run: |
          set -ex
          sudo apt-get update -y && sudo apt-get install -y flex bison cmake g++ git
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --recurse-submodules "$UPSTREAM" src
          cd src
          cmake -S deps/CppParser -B deps/CppParser/builds -DCMAKE_BUILD_TYPE=Release
          cmake --build deps/CppParser/builds --config Release -j"$(nproc)"
          # static libstdc++/libgcc => no GLIBCXX_3.4.3x dependency; built on 22.04 => GLIBC floor 2.35.
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_CONTRACTVERIFY_TESTS=OFF \
            -Dcppparser_DIR="$PWD/deps/CppParser/builds" -DCMAKE_PREFIX_PATH="$PWD/deps/CppParser/builds" \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libstdc++ -static-libgcc"
          cmake --build build --config Release -j"$(nproc)"
          cp build/src/contractverify "$GITHUB_WORKSPACE/contractverify-linux-x64"
          chmod +x "$GITHUB_WORKSPACE/contractverify-linux-x64"
          file "$GITHUB_WORKSPACE/contractverify-linux-x64"
          echo "max symbol versions (should be no GLIBCXX, GLIBC <= 2.35):"
          objdump -T "$GITHUB_WORKSPACE/contractverify-linux-x64" | grep -oE 'GLIBC(XX)?_[0-9.]+' | sort -V | uniq | tail -5
      - name: Upload artifact
        if: steps.gate.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with: { name: contractverify-linux-x64, path: contractverify-linux-x64, if-no-files-found: error }

  # darwin-arm64 from source (Apple Silicon runner). Best-effort: failure omits the platform.
  darwin-arm64:
    needs: linux-x64
    if: needs.linux-x64.outputs.changed == 'true'
    runs-on: macos-14
    steps:
      - name: Build contractverify from source
        run: |
          set -ex
          # global so superproject AND nested submodules clone over https (.gitmodules uses git@)
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git clone --recurse-submodules "$UPSTREAM" src
          cd src
          brew install flex bison           # cmake is preinstalled on macos-14
          FLEX="$(brew --prefix flex)/bin/flex"
          export PATH="$(brew --prefix flex)/bin:$(brew --prefix bison)/bin:$PATH"
          echo "cmake=$(cmake --version | head -1) flex=$($FLEX --version)"
          # CppParser dependency
          cmake -S deps/CppParser -B deps/CppParser/builds -DCMAKE_BUILD_TYPE=Release -DFLEX_EXECUTABLE="$FLEX"
          cmake --build deps/CppParser/builds --config Release
          ls deps/CppParser/builds/*.cmake 2>/dev/null || true
          # contractverify tool — help cmake find the just-built CppParser config
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_CONTRACTVERIFY_TESTS=OFF \
            -Dcppparser_DIR="$PWD/deps/CppParser/builds" \
            -DCMAKE_PREFIX_PATH="$PWD/deps/CppParser/builds" -DFLEX_EXECUTABLE="$FLEX"
          cmake --build build --config Release
          cp build/src/contractverify "$GITHUB_WORKSPACE/contractverify-darwin-arm64"
          file "$GITHUB_WORKSPACE/contractverify-darwin-arm64"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with: { name: contractverify-darwin-arm64, path: contractverify-darwin-arm64, if-no-files-found: error }

  # Aggregate whatever platform artifacts built into one manifest + the moving release.
  publish:
    needs: [linux-x64, darwin-arm64]
    if: ${{ always() && needs.linux-x64.result == 'success' && needs.linux-x64.outputs.changed == 'true' }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with: { path: dist, pattern: "contractverify-*", merge-multiple: true }
      - name: Build manifest (only platforms that produced a binary)
        run: |
          BASE="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          assets='{}'
          for key in linux-x64 darwin-arm64; do
            f="dist/contractverify-$key"
            [ -f "$f" ] || { echo "skip $key (no artifact)"; continue; }
            chmod +x "$f"
            sha="$(sha256sum "$f" | cut -d' ' -f1)"
            assets="$(echo "$assets" | jq --arg k "$key" --arg u "$BASE/contractverify-$key" --arg s "$sha" '. + {($k):{url:$u,sha256:$s}}')"
          done
          jq -n --arg v "${{ needs.linux-x64.outputs.version }}" --argjson a "$assets" '{version:$v, assets:$a}' > dist/verify-manifest.json
          cat dist/verify-manifest.json
      - name: Publish (moving verify-latest release)
        run: |
          gh release create "$TAG" dist/contractverify-* dist/verify-manifest.json \
            --title "contractverify (auto-tracking upstream)" --latest=false \
            --notes "Prebuilt Qubic contract-verify tool, re-published when upstream changes. Consumed by qinit (daily auto-update)." \
          || gh release upload "$TAG" dist/contractverify-* dist/verify-manifest.json --clobber
          # This is a tool artifact, not the qinit CLI — never let it claim the repo's "latest"
          # (else install.sh's old /releases/latest path, and the repo page, point at the wrong release).
          gh release edit "$TAG" --latest=false || true
