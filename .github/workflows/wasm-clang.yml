name: wasm-clang

# Build the clang+lld "llvm" multitool as WebAssembly (cross-emits native contract objects) + the per-platform
# header bundles, and publish them to the moving `wasm-clang-latest` release that `qinit up` fetches.
# Heavy + rare: run by hand when LLVM bumps. Dry-run by default (CI artifact only); set publish=true to
# update the release. The LLVM LTO link is the long pole on a free 4-vCPU/16 GB runner -> ccache (cheap reruns)
# + a swapfile (LTO link working set can exceed RAM with X86;AArch64;WebAssembly all enabled).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "release tag to publish to"
        default: "wasm-clang-latest"
      publish:
        description: "publish to the release (false = build + upload a CI artifact only)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: wasm-clang
  cancel-in-progress: false

env:
  CORE_REF: feat/dynamic-contracts

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (header source for the bundles)
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core

      - name: Free disk + add swap
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo fallocate -l 12G /mnt/swapfile && sudo chmod 600 /mnt/swapfile
          sudo mkswap /mnt/swapfile && sudo swapon /mnt/swapfile
          df -h / ; free -h

      - name: Host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build cmake clang lld g++-aarch64-linux-gnu xz-utils ccache curl git
          cmake --version | head -1; ninja --version; clang --version | head -1

      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: wasm-clang-llvm21
          max-size: 2G

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install

      # ~2-3 h on a 4-vCPU runner (self-bootstraps wasi-sdk-29 + YoWASP llvm source). ccache resumes reruns.
      - name: Build llvm.wasm
        run: bash toolchain/wasm-clang/build-wasm-clang.sh

      - name: Fetch wasmtime (runs the wasm clang to capture headers)
        run: |
          WT_TAG=$(curl -fsSL https://api.github.com/repos/bytecodealliance/wasmtime/releases/latest \
            | grep -oP '"tag_name":\s*"\K[^"]+')
          echo "wasmtime $WT_TAG"
          curl -fsSL "https://github.com/bytecodealliance/wasmtime/releases/download/$WT_TAG/wasmtime-$WT_TAG-x86_64-linux.tar.xz" \
            | tar -xJ -C "$HOME/wasm-toolchain"

      - name: Emit a representative contract wrapper (header-capture seed)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
        run: |
          mkdir -p dist
          bun -e '
            import { genWrapper } from "./packages/build/src/recipe";
            import { writeFileSync } from "node:fs";
            import { resolve } from "node:path";
            writeFileSync("dist/Counter.wrapper.cpp", genWrapper({
              contractPath: resolve("fixtures/Counter.h"), name: "Counter", slot: 28,
              corePath: process.env.QINIT_CORE, outDir: "dist",
            }));
          '
          test -s dist/Counter.wrapper.cpp

      - name: Build header bundles (linux-x64 + linux-arm64)
        run: |
          GVX=$(ls /usr/include/c++ | grep -E '^[0-9]+$' | sort -n | tail -1)
          GVA=$(ls /usr/aarch64-linux-gnu/include/c++ | grep -E '^[0-9]+$' | sort -n | tail -1)
          echo "g++ headers: native=$GVX  aarch64-cross=$GVA"
          for P in "linux-x64:$GVX" "linux-arm64:$GVA"; do
            PLATFORM="${P%:*}" GV="${P#*:}" \
              CORE="$GITHUB_WORKSPACE/core" WRAP="$GITHUB_WORKSPACE/dist/Counter.wrapper.cpp" \
              bash toolchain/wasm-clang/make-bundle.sh
          done

      - name: Package
        run: |
          OUT="$HOME/.cache/qinit/wasm-clang"
          ls -la "$OUT"
          for f in llvm.wasm bundle-linux-x64.json bundle-linux-arm64.json; do test -s "$OUT/$f"; done
          tar -C "$OUT" -czf wasm-clang.tar.gz .
          sha256sum wasm-clang.tar.gz | tee wasm-clang.tar.gz.sha256
          ls -lh wasm-clang.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-clang
          path: |
            wasm-clang.tar.gz
            wasm-clang.tar.gz.sha256

      - name: Publish to release
        if: ${{ inputs.publish }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" -t "wasm contract toolchain (clang.wasm + headers)" -n "Auto-built by wasm-clang.yml"
          gh release upload "$TAG" wasm-clang.tar.gz wasm-clang.tar.gz.sha256 --clobber
