# CI: typecheck + unit tests + a wasm build-corpus + a live deploy smoke, all against core-lite.
# - corpus: cross-repo drift catcher — compiles the fixtures (+ real QX/QEARN) to wasm against a live core
#   checkout, so a breaking change in core's qpi.h / contract macros / ABI turns this red.
# - deploy-smoke: builds the core wasm node from the branch, boots it, and runs a real on-chain deploy +
#   read + write (Get->Inc->Get=1) — catches deploy-pipeline regressions the corpus (compile-only) can't.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * *"   # daily drift probe against core
  workflow_dispatch:
    inputs:
      core_ref:
        description: "core-lite ref to build the corpus against"
        required: false
        default: "feat/dynamic-contracts"

env:
  BUN_VERSION: "1.3.14"
  CORE_REF: ${{ github.event.inputs.core_ref || 'feat/dynamic-contracts' }}

jobs:
  # Typecheck + unit tests on every host OS — qinit ships per-host process/tar/path code, so a
  # Linux-only run lets portability bugs (e.g. MSYS `tar -C` mangling) reach core's smoke undetected.
  lint-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    runs-on: ${{ matrix.os }}
    env:
      QINIT_CORE: ${{ github.workspace }}/core
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Verify generated core ABI
        run: bun packages/core/tools/gen-wasm-abi.ts --core "$QINIT_CORE" --check
      - name: Verify bundled browser snapshot
        run: bun packages/compile/tools/gen-qpi-snapshot.ts --core "$QINIT_CORE" --verify --check
      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json
      - name: Unit tests
        run: bun test

  # Build the library packages' Node dist (the `import` export condition) and import each under plain Node, so
  # a Bun-only regression — an extensionless @qubic-lib import, a stray Bun.* in the bundle, a build break —
  # turns CI red. The libraries are meant to run on Node; the toolchain (cli/build) stays Bun-only by design.
  node-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: bun install
      - name: Build Node dist (engine, proto, core)
        run: |
          (cd packages/engine && bun run build)
          (cd packages/proto && bun run build)
          (cd packages/core && bun run build)
      - name: Import each dist under plain Node
        run: |
          node --input-type=module -e '
            import { layoutOf } from "./packages/proto/dist/index.js";
            import { buildSignedTx, deriveIdentity } from "./packages/core/dist/browser.js";
            import { Sim } from "./packages/engine/dist/index.js";
            if (layoutOf("uint64").size !== 8) throw new Error("proto codec broken");
            if (typeof buildSignedTx !== "function" || typeof deriveIdentity !== "function") throw new Error("core surface broken");
            if (typeof Sim !== "function") throw new Error("engine surface broken");
            console.log("node-dist OK: proto + core + engine import under plain node");
          '

  # Build the external Qubic CLI from source and drive the in-process engine's peer-protocol server with it.
  # The engine's cli-e2e tests are gated on QUBIC_CLI (lint-test's `bun test` skips them); this job provides the
  # binary. Linux-only — the CLI is a CMake C++ build. A breaking upstream protocol change turns this red.
  cli-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout qubic-cli
        uses: actions/checkout@v4
        with:
          repository: qubic/qubic-cli
          path: qubic-cli
          submodules: recursive
      - name: Checkout qlogging
        uses: actions/checkout@v4
        with:
          repository: qubic/qlogging
          path: qlogging
      - name: Build qubic-cli
        run: |
          cmake -S qubic-cli -B qubic-cli/build -DCMAKE_BUILD_TYPE=Release
          cmake --build qubic-cli/build -j"$(nproc)"
      - name: Build qlogging
        run: |
          cmake -S qlogging -B qlogging/build -DCMAKE_BUILD_TYPE=Release -DCMAKE_POLICY_VERSION_MINIMUM=3.5
          cmake --build qlogging/build -j"$(nproc)"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: CLI e2e against the in-process engine
        env:
          QUBIC_CLI: ${{ github.workspace }}/qubic-cli/build/qubic-cli
          QLOGGING: ${{ github.workspace }}/qlogging/build/qlogging
        run: bun test packages/engine/tests/integration/cli-e2e.test.ts packages/engine/tests/logging/qlogging-integration.test.ts

  # contractverify every fixtures/*.h against the qpi.h protocol rules (the AST checker, not just a wasm
  # compile). The script self-fetches the cached verify tool; a fixture that drifts out of compliance reds it.
  verify-fixtures:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: contractverify fixtures
        run: bun run scripts/verify-fixtures.ts

  corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install

      - name: Protocol drift guard (qinit constants vs core)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
        run: bun run scripts/check-protocol-drift.ts

      # The QPI extension's Tier-A linter must raise 0 warning/error findings on the real deployed
      # contracts (they're valid QPI) — a regression guard against linter false positives.
      - name: QPI linter false-positive gate (real contracts)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
        run: bun run packages/vscode/scripts/lint-corpus.ts

      - name: Cache wasi-sdk
        id: wasisdk
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: wasi-sdk-29.0-x86_64-linux
      - name: Fetch wasi-sdk-29
        if: steps.wasisdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz
          mkdir -p wasi-sdk && tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1

      - name: Build corpus against core
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run scripts/ci-build-corpus.ts

      - name: Light system-contract gtests (Clang runner, TS contracts)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run test:sc:light

      - name: Heavy system-contract gtests (scheduled/manual only)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run test:sc:heavy

      - name: Shared-memory system corpus (TS compiler)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run scripts/ci-qpi-shared-memory.ts

  # Deterministic randomized differential gate for every public QPI container family. Each fixture is
  # compiled once by the TS compiler and native WASI, then reset between seeds. The exact TS artifact
  # is also executed unchanged by the standalone core-lite WAMR gtest.
  container-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      QINIT_CORE: ${{ github.workspace }}/core
      QINIT_CONTAINER_PARITY: "1"
      QINIT_REQUIRE_CONTAINER_TOOLCHAINS: "1"
      QINIT_CONTAINER_SEEDS: ${{ github.event_name == 'schedule' && '32' || '4' }}
      QINIT_CONTAINER_OPERATIONS: ${{ github.event_name == 'schedule' && '256' || '64' }}
      QINIT_WAMR_GTEST: ${{ github.workspace }}/core/build-container-parity/test/qubic_core_tests
      WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
      WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite with submodules (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core
          submodules: recursive

      - name: Install core-lite test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-18 cmake nasm ccache g++ \
            libboost-stacktrace-dev libc++-dev libc++abi-dev libjsoncpp-dev uuid-dev \
            zlib1g-dev libzstd-dev libfmt-dev liblzo2-dev liblz4-dev libssl-dev libffi-dev
      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: core-container-parity
          max-size: 2G

      - name: Build standalone WAMR core tests
        working-directory: core
        run: |
          cmake -S . -B build-container-parity -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_BINARY=OFF -DBUILD_TESTS=ON -DENABLE_AVX512=OFF -DUSE_SANITIZER=OFF \
            -DTESTNET=ON -DTESTNET_LITE_RAM=ON \
            -DLITE_WASM_SC=ON
          cmake --build build-container-parity --target qubic_core_tests -- -j$(nproc)
          test -x build-container-parity/test/qubic_core_tests

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install

      - name: Cache wasi-sdk
        id: container-wasi
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: wasi-sdk-29.0-x86_64-linux
      - name: Fetch wasi-sdk-29
        if: steps.container-wasi.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz
          mkdir -p wasi-sdk && tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1

      - name: Native differential and exact-artifact WAMR parity
        run: bun test packages/compile/tests/differential/container-parity.test.ts

  deploy-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core

      - name: Build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang-18 cmake nasm ccache g++ \
            libboost-stacktrace-dev libc++-dev libc++abi-dev libjsoncpp-dev uuid-dev \
            zlib1g-dev libzstd-dev libfmt-dev liblzo2-dev liblz4-dev libssl-dev libffi-dev
      - uses: hendrikmuhs/ccache-action@v1
        with:
          key: core-node-wasm
          max-size: 2G

      # Deploy-ready node: TESTNET + LITE_RAM + PREFILL + wasm engine + tx-status addon, real (committed,
      # public testnet) private_settings via ONLY_LOGGING=OFF. RAM-only (NO_USE_SWAP) fits the free runner.
      - name: Build wasm node
        working-directory: core
        run: |
          cmake -S . -B build-node -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18 \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DBUILD_BINARY=ON -DBUILD_TESTS=OFF -DENABLE_AVX512=OFF -DUSE_SANITIZER=OFF \
            -DTESTNET=ON -DTESTNET_LITE_RAM=ON -DTESTNET_PREFILL_QUS=ON \
            -DLITE_WASM_SC=ON -DCMAKE_NO_USE_SWAP=ON -DADDON_TX_STATUS_REQUEST=ON -DONLY_LOGGING=OFF
          cmake --build build-node --target Qubic -- -j$(nproc)

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install

      - name: Cache wasi-sdk
        id: wasisdk
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: wasi-sdk-29.0-x86_64-linux
      - name: Fetch wasi-sdk-29
        if: steps.wasisdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz
          mkdir -p wasi-sdk && tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1

      - name: Boot node + deploy smoke
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: |
          mkdir -p run
          ( cd run && "$GITHUB_WORKSPACE/core/build-node/src/Qubic" \
              --peers 127.0.0.1 --node-mode 3 --ticking-delay 1000 > node.log 2>&1 & echo $! > node.pid )
          # Robust boot-wait via the shared poller (retries under set -e; see scripts/poll-node-json.sh).
          if t=$(bash scripts/poll-node-json.sh http://127.0.0.1:41841/live/v1/tick-info '.tick // 0' 50 3); then
            echo "node ticking at $t"
          else
            echo "node never ticked"; tail -40 run/node.log; exit 1
          fi
          set +e
          bun run scripts/ci-deploy-smoke.ts; c1=$?
          bun run scripts/gauntlet-smoke.ts;  c2=$?   # QPI edge-case gauntlet (div/mod, wrap, K12, HashMap, ...)
          bun run scripts/ci-qpi-dual-engine.ts; c3=$? # one TS artifact, byte-identical Sim + production WAMR state/output/digest
          bun run scripts/ci-logging-dual-engine.ts; c4=$? # one TS artifact, byte-identical LOG_* payloads in Sim + production WAMR
          bun run scripts/ci-random-dual-engine.ts; c5=$? # chain-seeded PRNG vectors, exact artifact and state in Sim + WAMR
          set -e
          kill "$(cat run/node.pid)" 2>/dev/null || true
          echo "=== node.log tail ==="; tail -25 run/node.log
          [ $c1 -eq 0 ] && [ $c2 -eq 0 ] && [ $c3 -eq 0 ] && [ $c4 -eq 0 ] && [ $c5 -eq 0 ]

  # QPI VS Code extension. Unit tests run in lint-test (bun test); these two prove the parts that need a
  # toolchain or a real editor: the clangd enablement gate, and the providers in a headless VS Code.
  vscode-clangd-check:
    # The clangd enablement gate on Linux (gating) + macOS (advisory until proven green). The asset
    # names match @qinit/core fetch.ts so we exercise the exact per-OS toolchain `qinit node run` would sync.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            wasi_asset: wasi-sdk-29.0-x86_64-linux
            clangd_asset: clangd-linux-20.1.0
          - os: macos-latest          # Apple Silicon runner
            wasi_asset: wasi-sdk-29.0-arm64-macos
            clangd_asset: clangd-mac-20.1.0
            advisory: true
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.advisory || false }}
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Cache wasi-sdk
        id: wasisdk
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: ${{ matrix.wasi_asset }}
      - name: Fetch wasi-sdk-29
        if: steps.wasisdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/${{ matrix.wasi_asset }}.tar.gz
          mkdir -p wasi-sdk && tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1
      - name: Install clangd 20 (match the wasi-sdk clang major)
        run: |
          curl -fsSL -o clangd.zip \
            https://github.com/clangd/clangd/releases/download/20.1.0/${{ matrix.clangd_asset }}.zip
          unzip -q clangd.zip
          echo "${{ github.workspace }}/clangd_20.1.0/bin" >> "$GITHUB_PATH"
      - name: Clear quarantine on the macOS clangd binary
        if: runner.os == 'macOS'
        run: xattr -dr com.apple.quarantine clangd_20.1.0 || true
      - name: clangd enablement gate (clangd --check on the generated DB)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run packages/vscode/scripts/clangd-gate.ts
      - name: clangd completion probe (public API completes; no cross-scope flood)
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run packages/vscode/scripts/clangd-complete.ts

  vscode-it:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Install xvfb (headless display for VS Code)
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Integration tests (headless VS Code)
        run: xvfb-run -a bun run --filter qpi-vscode test:int
