# CI: typecheck + unit tests + a wasm build-corpus against core-lite.
# The corpus is the cross-repo drift catcher — it compiles the fixtures (+ the real QX/QEARN) to wasm against a
# live core checkout, so a breaking change in core's qpi.h / contract macros / ABI turns this red instead of
# silently surfacing at deploy time. The scheduled run re-checks against the core branch with no qinit change.
name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 6 * * *"   # daily drift probe against core
  workflow_dispatch:
    inputs:
      core_ref:
        description: "core-lite ref to build the corpus against"
        required: false
        default: "feat/dynamic-contracts"

env:
  BUN_VERSION: "1.3.14"
  CORE_REF: ${{ github.event.inputs.core_ref || 'feat/dynamic-contracts' }}

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install
      - name: Typecheck
        run: bunx tsc --noEmit -p tsconfig.json
      - name: Unit tests
        run: bun test

  corpus:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkout core-lite (${{ env.CORE_REF }})
        uses: actions/checkout@v4
        with:
          repository: hackerby888/core-lite
          ref: ${{ env.CORE_REF }}
          path: core
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install

      - name: Cache wasi-sdk
        id: wasisdk
        uses: actions/cache@v4
        with:
          path: wasi-sdk
          key: wasi-sdk-29.0-x86_64-linux
      - name: Fetch wasi-sdk-29
        if: steps.wasisdk.outputs.cache-hit != 'true'
        run: |
          curl -fsSL -o wasi-sdk.tar.gz \
            https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-29/wasi-sdk-29.0-x86_64-linux.tar.gz
          mkdir -p wasi-sdk && tar -xzf wasi-sdk.tar.gz -C wasi-sdk --strip-components=1

      - name: Build corpus against core
        env:
          QINIT_CORE: ${{ github.workspace }}/core
          WASM_CLANG: ${{ github.workspace }}/wasi-sdk/bin/clang++
          WASI_SYSROOT: ${{ github.workspace }}/wasi-sdk/share/wasi-sysroot
        run: bun run scripts/ci-build-corpus.ts
